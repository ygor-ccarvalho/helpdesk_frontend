<mat-drawer-container class="container" autosize>
    <mat-drawer #drawer class="sidenav" mode="side">
        <img src="assets/img/side-image.svg" alt="Imagem de Navegação">
      <mat-nav-list class="nav-list">

        <a class="mat-list-item" mat-list-item routerLink="/home">
            <mat-icon class="material-icons">home</mat-icon>
            <span>Home</span>
        </a>

        <a mat-list-item routerLink="/tecnicos">
            <mat-icon class="material-icons">account_circle</mat-icon>
            <span>Técnicos</span>
        </a>

        <a mat-list-item routerLink="/clientes">
            <mat-icon class="material-icons">person</mat-icon>
            <span>Clientes</span>
        </a>

        <a mat-list-item routerLink="/chamados">
            <mat-icon class="material-icons">assignment</mat-icon>
            <span>Chamados</span>
        </a>

        <a mat-list-item href="https://github.com/ygor-ccarvalho/helpdesk_frontend" target="_blank">
            <mat-icon class="material-icons">code</mat-icon>
            <span>Github</span>
        </a>

        <a mat-list-item routerLink="/logout" (click)="logout()">
            <mat-icon class="material-icons">logout</mat-icon>
            <span>Logout</span>
        </a>


      </mat-nav-list>  
    </mat-drawer>

    <div class="sidenav-content">
        <app-header></app-header>
        <button class="menu" (click)="drawer.toggle()" mat-icon-button>
            <mat-icon>menu</mat-icon>
        </button>
        <router-outlet></router-outlet>
    </div>

</mat-drawer-container>
