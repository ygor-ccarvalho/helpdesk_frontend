<div class="container">
    @if(tecnico){
    <section class="card">

       
        <header class="header">
            <h1>Deletar Técnico</h1>
            <img src="assets/img/tecnico-create.svg" alt="Deletar técnico">
        </header>

        <div class="field full">
            <span class="label">Nome</span>
            <span class="value">{{ tecnico.nome }}</span>
        </div>

        <div class="grid">
            <div class="field">
                <span class="label">CPF</span>
                <span class="value">{{ tecnico.cpf }}</span>
            </div>
            <div class="field">
                <span class="label">Email</span>
                <span class="value">{{ tecnico.email }}</span>
            </div>
        </div>

        <div class="field full">
            <span class="label">Perfis</span>
            <div class="perfis">
                @for (perfil of perfisNomes; track perfil) {
                <span class="badge">{{ perfil }}</span>
                }
            </div>
        </div>

        <div class="actions">
            <button mat-flat-button class="btn-deletar" (click)="delete()">
                <mat-icon>delete</mat-icon>
                Deletar
            </button>
            <button mat-stroked-button routerLink="/tecnicos" class="cancelBtn">Cancelar</button>
        </div>

    </section>
    }
</div>
