<div class="container">

    <div class="page-header">
        <h1>Lista de Clientes</h1>
        <button mat-flat-button routerLink="create" class="btn-novo">
            <mat-icon>add</mat-icon>
            Novo Cliente
        </button>
    </div>

    <div class="tabela">
        <div class="tabela-header">
            <mat-form-field appearance="outline" class="search-field">
                <mat-label>Buscar cliente</mat-label>
                <mat-icon matPrefix>search</mat-icon>
                <input matInput (keyup)="applyFilter($event)" placeholder="Nome, CPF ou email..." #input>
            </mat-form-field>
        </div>

        <div class="table-wrapper">
            <table mat-table [dataSource]="dataSource">

                <ng-container matColumnDef="id">
                    <th mat-header-cell *matHeaderCellDef>ID</th>
                    <td mat-cell *matCellDef="let element">{{ element.id }}</td>
                </ng-container>

                <ng-container matColumnDef="nome">
                    <th mat-header-cell *matHeaderCellDef>Nome</th>
                    <td mat-cell *matCellDef="let element">{{ element.nome }}</td>
                </ng-container>

                <ng-container matColumnDef="cpf">
                    <th mat-header-cell *matHeaderCellDef>CPF</th>
                    <td mat-cell *matCellDef="let element">{{ element.cpf }}</td>
                </ng-container>

                <ng-container matColumnDef="email">
                    <th mat-header-cell *matHeaderCellDef>Email</th>
                    <td mat-cell *matCellDef="let element">{{ element.email }}</td>
                </ng-container>

                <ng-container matColumnDef="acoes">
                    <th mat-header-cell *matHeaderCellDef>Ações</th>
                    <td mat-cell *matCellDef="let element">
                        <a [routerLink]="['update', element.id]" mat-icon-button class="btn-edit">
                            <mat-icon>edit</mat-icon>
                        </a>
                        <button mat-icon-button class="btn-delete" [routerLink]="['delete', element.id]">
                            <mat-icon>delete</mat-icon>
                        </button>
                    </td>
                </ng-container>

                <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
                <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>

                <tr class="mat-row" *matNoDataRow>
                    <td class="mat-cell no-data" colspan="5">
                        <mat-icon>search_off</mat-icon>
                        Nenhum cliente encontrado para "{{ input.value }}"
                    </td>
                </tr>

            </table>
            <mat-paginator [pageSizeOptions]="[10, 25, 50]" showFirstLastButtons></mat-paginator>
        </div>
    </div>
</div>
