<div class="container">
    <form [formGroup]="form" class="form">

        <h1 class="fullWidth">Cadastrar Cliente</h1>

        <img class="fullWidth" src="assets/img/cliente-create.svg" alt="Cadastrar Cliente">


        <section class="section">
            <mat-checkbox (change)="addPerfil(0, $event)" class="margin">Admin</mat-checkbox>
            <mat-checkbox (change)="addPerfil(1, $event)" class="margin">Cliente</mat-checkbox>
            <mat-checkbox (change)="addPerfil(2, $event)" class="margin">Cliente</mat-checkbox>
        </section>

        <mat-form-field class="fullWidth" appearance="outline">
            <mat-label>Nome</mat-label>
            <input matInput formControlName="nome" placeholder="Nome Completo" maxlength="50">
            <mat-icon matSuffix>account_circle</mat-icon>

            <mat-error *ngIf="form.get('nome')?.invalid">
                Nome deve ter no mínimo 3 caracteres
            </mat-error>
        </mat-form-field>

        <mat-form-field class="fullWidth" appearance="outline">
            <mat-label>CPF</mat-label>
            <input matInput formControlName="cpf" mask="000.000.000-00" placeholder="000.000.000-00">
            <mat-icon matSuffix>badge</mat-icon>

            <mat-error *ngIf="form.get('cpf')?.invalid">
                CPF é obrigatório
            </mat-error>
        </mat-form-field>

        <mat-form-field class="fullWidth" appearance="outline">
            <mat-label>Email</mat-label>
            <input matInput formControlName="email" placeholder="exemplo@mail.com">
            <mat-icon matSuffix>mail</mat-icon>

            <mat-error *ngIf="form.get('email')?.invalid">
                Email inválido
            </mat-error>
        </mat-form-field>

        <mat-form-field class="fullWidth" appearance="outline">
            <mat-label>Senha</mat-label>
            <input matInput type="password" formControlName="senha" placeholder="Mínimo 3 caracteres">
            <mat-icon matSuffix>lock</mat-icon>

            <mat-error *ngIf="form.get('senha')?.invalid">
                Senha deve ter no mínimo 3 caracteres
            </mat-error>
        </mat-form-field>

        <button class="fullWidth" matButton="filled" (click)="create()" [disabled]="form.invalid">
            Cadastrar
        </button>

        <button type="button" routerLink="../" class="fullWidth cancelBtn" mat-stroked-button>
            Cancelar
        </button>

    </form>
</div>
